name: CF Kerno Pipeline (Cloudflare R2)

on:
  schedule:
    # Run every 2 days at 7:00 AM UTC
    - cron: '0 7 */2 * *'

  workflow_dispatch: # Allow manual trigger with category selection
    inputs:
      category:
        description: 'Select category to scrape'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - home
          - organizers
          - super_saver

jobs:
  scrape:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false # Continue other jobs even if one fails
      matrix:
        category:
          - name: home
            display_name: Home
          - name: organizers
            display_name: Organizers
          - name: super_saver
            display_name: Super Saver

    name: Scrape ${{ matrix.category.display_name }}

    steps:
      - name: Check if should run
        id: should_run
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ inputs.category }}" == "all" ]] || \
             [[ "${{ inputs.category }}" == "${{ matrix.category.name }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.should_run.outputs.run == 'true'
        run: |
          cd CF/${{ matrix.category.name }}
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: steps.should_run.outputs.run == 'true'
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        if: steps.should_run.outputs.run == 'true'
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          MAX_CONCURRENT_SUBCATEGORIES: 3
        run: |
          cd CF/${{ matrix.category.name }}
          python scraper.py

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        if: steps.should_run.outputs.run == 'true' && always()
        with:
          name: cf-${{ matrix.category.name }}-results
          path: |
            CF/${{ matrix.category.name }}/data/*.xlsx
            CF/${{ matrix.category.name }}/data/images/*.jpg
            CF/${{ matrix.category.name }}/data/images/*.png
            CF/${{ matrix.category.name }}/data/images/*.gif
            CF/${{ matrix.category.name }}/data/images/*.webp
          retention-days: 7

      - name: Notify on failure
        if: steps.should_run.outputs.run == 'true' && failure()
        run: |
          echo "Scraping job for ${{ matrix.category.display_name }} failed! Check the logs."
          # Add notification logic here (Slack, email, etc.)
